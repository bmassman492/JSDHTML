    </p>
    <img id="inside-pic" src="img/birthday_girl.jfif" alt="girl img"> <!-- replace img here -->

    <!-- add <form> element here before the <p> element below -->
      <form action="reply.html">
        <label for="wishinput">Enter your birthday wish:</label>
        <input type="text" id="wishinput" name="wishinput">
        <input type="submit" value="Submit">

        </label>

    </p>
