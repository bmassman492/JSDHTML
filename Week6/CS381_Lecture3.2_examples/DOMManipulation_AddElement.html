<!DOCTYPE html>
<html>
  <head>
    <title>Document Object Model - Add Element</title>
    <link rel="stylesheet" href="css/c05.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>
  <body>
    <div id="page">
      <h1 id="header">List</h1>
      <h2>Buy groceries</h2>
      <ul id="todo">
		<li id="one" class="hot"><em>fresh</em> figs</li>
		<li id="two" class="hot">pine nuts</li>
		<li id="three" class="hot">honey</li>
		<li id="four">balsamic vinegar</li>
	</ul>
    </div>
    <script>
	// Create a new element and store it in a variable.
		let newEl = document.createElement('li');

	// Create a text node and store it in a variable.
		let newText = document.createTextNode('quinoa');

	// Attach the new text node to the new element.
		newEl.appendChild(newText);

	// Find the position where the new element should be added.
	// locate the position of the 1st <ul> element in the add-element.html
		let position = document.getElementsByTagName('ul')[0]; 
    
	// Insert the new element into its position.
	// add the new element as the last child in the <ul> element
		position.appendChild(newEl); 

	// how to add the new node before the second <li> element in the <ul> 
	//	position.insertBefore(newEl, document.getElementById('two'));
	
	// compare above statement with the following: 
	 // position.insertBefore(newEl.cloneNode(true), document.getElementById('two'));
	</script>
  </body>
</html>
